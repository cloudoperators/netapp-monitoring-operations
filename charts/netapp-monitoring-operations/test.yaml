            component: netapp_ems
          annotations:
            summary: 'Mirror Replication Update Failed'
            description: 'ONTAP failed to update the system registry with upgraded SnapMirror status keys |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: MgmtSnapmirResyncFail
          expr: last_over_time(ems_events{message="mgmt.snapmir.resync.fail"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Mirror Replication Resync Failed'
            description: 'Resync from source volume {{ $labels.srcpath }} to destination volume {{ $labels.dstpath }} failed. Error: {{ $labels.error }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: SnapvaultTgtFailure
          expr: last_over_time(ems_events{message="snapvault.tgt.failure"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Asynchronous Vault Initialize Failed'
            description: 'Failed to create snapshot target {{ $labels.snapname }} on volume {{ $labels.volume }}. Reason: {{ $labels.reason }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: RaidConfigSpareDiskMissing
          expr: last_over_time(ems_events{message="raid.config.spare.disk.missing"}[5m]) == 1
          for: 5m
          labels:
            severity: info
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Cluster Lacks Spare Disks'
            description: 'Spare disk missing on shelf {{ $labels.shelf }}, bay {{ $labels.bay }} (Disk: {{ $labels.disk_info }}, Serial: {{ $labels.serialno }}, Model: {{ $labels.model }}). Reason: {{ $labels.failure_reason }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: diskErrUnsupported
          expr: last_over_time(ems_events{message="disk.init.err.unsupported"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Some Unsupported Disks'
            description: 'Disk {{ $labels.diskName }} is not recognized as a supported disk and cannot be used on this node |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: netifexcessLinkInterrupts
          expr: last_over_time(ems_events{message="netif.excessLinkInterrupts"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Excessive link interrupts occurred on network interface'
            description: 'Excessive link status change interrupts occurred on network interface {{ $labels.interface_name }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: NetifSFPNotSupported
          expr: last_over_time(ems_events{message="netif.sfpNotSupported"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Excessive link interrupts occurred on network interface'
            description: 'The SFP or QSFP module {{ $labels.sfp_vendor }} {{ $labels.sfp_pn }} installed in {{ $labels.if_name }} is not supported with this network interface |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: UncorEccError
          expr: last_over_time(ems_events{message="netif.uncorEccerror"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Unrecoverable ECC error on network interface'
            description: 'Unrecoverable ECC error on network interface {{ $labels.if_name }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: vifmgrCluslinkdown
          expr: last_over_time(ems_events{message="vifmgr.clus.linkdown"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Port Down'
            description: 'The cluster port {{ $labels.port_name }} on node {{ $labels.node_name }} has gone down unexpectedly |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: vifmgrlifdownnoports
          expr: last_over_time(ems_events{message="vifmgr.lifdown.noports"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Port Down with no failover targets'
            description: 'LIF {{ $labels.vif_name }} on virtual server {{ $labels.virtual_server_id }} with IP address {{ $labels.vif_ip }} cannot be hosted on node {{ $labels.to_node }} port {{ $labels.to_port }} or any of its failover targets and is being marked as down |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: VifmgrlifsClusterlimit
          expr: last_over_time(ems_events{message="vifmgr.lifs.clusterlimit"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Data Lif limit exceeded'
            description: 'The total number of data LIFs in this cluster {{ $labels.number_of_lifs }} exceeds the supported limit of {{ $labels.lif_limit }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: vifmgr.lifs.overcapacity
          expr: last_over_time(ems_events{message="vifmgr.lifs.overcapacity"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Data Lif limit exceeded'
            description: 'Node with failover targets over-provisioned {{ $labels.over_amount }} LIFs could be marked "down" during node outage |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: VifmgrPortMonitorFailed
          expr: last_over_time(ems_events{message="vifmgr.port.monitor.failed"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Port is in degraded state'
            description: 'The {{ $labels.health_check_type }} health check for port {{ $labels.port_name }} on node {{ $labels.node_name }} has failed. The port is operating in a degraded state |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: VifmgrPortMtumismatch
          expr: last_over_time(ems_events{message="vifmgr.port.mtumismatch"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'vifmgr port mtu mismatch'
            description: 'The MTU of port {{ $labels.port_name }} ({{ $labels.port_mtu }}) does not match the MTU of broadcast domain {{ $labels.broadcast_domain }} ({{ $labels.broadcast_domain_mtu }}) |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: VifmgrPortDeglifHosted
          expr: last_over_time(ems_events{message="vifmgr.portDeg.lifHosted"}[5m]) == 1
          for: 5m
          labels:
            severity: info
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'LIF hosted on a degraded port'
            description: 'LIF {{ $labels.vif_name }} on virtual server {{ $labels.virtual_server_id }} is hosted on a degraded port {{ $labels.port_name }} on node {{ $labels.node_name }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: WaflDirSizeMaxWarning
          expr: last_over_time(ems_events{message="wafl.dir.size.max.warning"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Max DIR limit reached'
            description: 'Directory size for file ID {{ $labels.file_id }} in volume {{ $labels.volume }} is approaching the maximum directory size limit. |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: diskioMediumError
          expr: last_over_time(ems_events{message="disk.ioMediumerror"}[5m]) == 1
          for: 5m
          labels:
            severity: info
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Medium error on disk'
            description: 'Medium error on disk {{ $labels.disk_name }} {{ $labels.disk_info }} {{ $labels.disk_information }} |
              Operation: {{ $labels.operation }} |
              Sector: {{ $labels.sector }} (Code: {{ $labels.sector_code }}) |
              Sense Key: {{ $labels.sense_key }} |
              Sense Code: {{ $labels.sense_code }} |
              Sense Info: {{ $labels.sense_info }} |
              Qualifier: {{ $labels.qualifier }} |
              FRU Failed: {{ $labels.fru_failed }} |
              Command Time: {{ $labels.command_time }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
        - alert: MonitorGlobalStatusCritical
          expr: last_over_time(ems_events{message="monitor.globalStatus.critical"}[5m]) == 1
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ems
          annotations:
            summary: 'Cluster Health Critical'
            description: 'Global Status Critical alert triggered: {{ $labels.problem_description }} |
              Cluster: {{ $labels.cluster }} |
              NetApp Cluster: {{ $labels.netapp_cluster }} |
              Node: {{ $labels.node }} |
              Datacenter: {{ $labels.datacenter }} |
              LOB: {{ $labels.lob }} |
              Service: {{ $labels.Service }}'
---
# Source: netapp-monitoring-operations/templates/alerts.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-netapp-ha-alerts
  namespace: monsoon3
  labels:
    prometheus: storage
    helm.sh/chart: netapp-monitoring-operations-1.0.2
    app.kubernetes.io/name: netapp-monitoring-operations
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "1.0.2"
    app.kubernetes.io/managed-by: Helm
  annotations:
    prometheus.io/alert: "true"
spec:
  
  groups:
    - name: cf_fsm_takeoverOfPartnerDisabled_final
      interval: 1m
      rules:
        - record: cf_fsm_takeoverOfPartnerDisabled_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, partner) (
              max_over_time(ems_events{message="cf.fsm.takeoverOfPartnerDisabled"}[2m])
            )
        - record: cf_fsm_takeoverOfPartnerEnabled_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, partner) (
              max_over_time(ems_events{message="cf.fsm.takeoverOfPartnerEnabled"}[2m])
            )
        - record: cf_fsm_takeoverOfPartnerDisabled_persistent
          expr: |
            (
              cf_fsm_takeoverOfPartnerDisabled_trigger
              or
              cf_fsm_takeoverOfPartnerDisabled_persistent
            )
            unless
            cf_fsm_takeoverOfPartnerEnabled_trigger
  
    - name: cf_fsm_takeoverOfPartnerDisabled_alerts
      rules:
        - alert: CfFsmTakeoverOfPartnerDisabled
          expr: cf_fsm_takeoverOfPartnerDisabled_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Takeover of partner {{ $labels.partner }} disabled'
            description: >
              'On node {{ $labels.node }}, takeover of its partner {{ $labels.partner }}
              has been disabled. This compromises high availability. The alert resolves when
              the event "cf.fsm.takeoverOfPartnerEnabled" is detected.'
  
    - name: cf_fsm_takeoverByPartnerDisabled_final
      interval: 1m
      rules:
        - record: cf_fsm_takeoverByPartnerDisabled_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, partner) (
              max_over_time(ems_events{message="cf.fsm.takeoverByPartnerDisabled"}[2m])
            )
        - record: cf_fsm_takeoverByPartnerEnabled_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, partner) (
              max_over_time(ems_events{message="cf.fsm.takeoverByPartnerEnabled"}[2m])
            )
        - record: cf_fsm_takeoverByPartnerDisabled_persistent
          expr: |
            (
              cf_fsm_takeoverByPartnerDisabled_trigger
              or
              cf_fsm_takeoverByPartnerDisabled_persistent
            )
            unless
            cf_fsm_takeoverByPartnerEnabled_trigger
  
    - name: cf_fsm_takeoverByPartnerDisabled_alerts
      rules:
        - alert: CfFsmTakeoverByPartnerDisabled
          expr: cf_fsm_takeoverByPartnerDisabled_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Takeover by partner {{ $labels.partner }} disabled'
            description: >
              'Takeover of node {{ $labels.node }} by its partner {{ $labels.partner }}
              has been disabled. This compromises high availability. The alert resolves when
              the event "cf.fsm.takeoverByPartnerEnabled" is detected.'
  
    - name: callhome_reboot_takeover_final
      interval: 1m
      rules:
        - record: callhome_reboot_takeover_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="callhome.reboot.takeover"}[2m])
            )
        - record: sfo_giveback_complete_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="sfo.giveback.complete"}[2m])
            )
        - record: callhome_reboot_takeover_persistent
          expr: |
            (
              callhome_reboot_takeover_trigger
              or
              callhome_reboot_takeover_persistent
            )
            unless
            sfo_giveback_complete_trigger
  
    - name: callhome_reboot_takeover_alerts
      rules:
        - alert: CallhomeRebootTakeover
          expr: callhome_reboot_takeover_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Node {{ $labels.node }} taken over due to reboot'
            description: >
              'Node {{ $labels.node }} has taken over its partner due to a
              reboot. The alert resolves when the event "sfo.giveback.complete" is detected.'
  
    - name: clam_node_ooq_final
      interval: 1m
      rules:
        - record: clam_node_ooq_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="clam.node.ooq"}[2m])
            )
        - record: sfo_giveback_complete_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="clam.node.inq"}[2m])
            )
        - record: clam_node_ooq_persistent
          expr: |
            (
              clam_node_ooq_trigger
              or
              clam_node_ooq_persistent
            )
            unless
            sfo_giveback_complete_trigger
  
    - name: clam_node_ooq_alerts
      rules:
        - alert: ClamNodeOoq
          expr: clam_node_ooq_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Node {{ $labels.node }} is out of quorum'
            description: >
              'Node {{ $labels.node }} is out of quorum (OOQ), indicating a Cluster
              state issue. The alert resolves when the event "sfo.giveback.complete" is detected.'
  
    - name: callhome_partner_down_final
      interval: 1m
      rules:
        - record: callhome_partner_down_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="callhome.partner.down"}[2m])
            )
        - record: sfo_giveback_complete_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="sfo.giveback.complete"}[2m])
            )
        - record: callhome_partner_down_persistent
          expr: |
            (
              callhome_partner_down_trigger
              or
              callhome_partner_down_persistent
            )
            unless
            sfo_giveback_complete_trigger
  
    - name: callhome_partner_down_alerts
      rules:
        - alert: CallhomePartnerDown
          expr: callhome_partner_down_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Partner node of {{ $labels.node }} is down'
            description: >
              'The partner node of {{ $labels.node }} is down, triggering a takeover.
              The alert resolves when the event "sfo.giveback.complete" is detected.'
  
    - name: callhome_sfo_takeover_final
      interval: 1m
      rules:
        - record: callhome_sfo_takeover_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="callhome.sfo.takeover"}[2m])
            )
        - record: sfo_giveback_complete_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="sfo.giveback.complete"}[2m])
            )
        - record: callhome_sfo_takeover_persistent
          expr: |
            (
              callhome_sfo_takeover_trigger
              or
              callhome_sfo_takeover_persistent
            )
            unless
            sfo_giveback_complete_trigger
  
    - name: callhome_sfo_takeover_alerts
      rules:
        - alert: CallhomeSfoTakeover
          expr: callhome_sfo_takeover_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 SFO takeover occurred on {{ $labels.node }}'
            description: >
              'A Storage Failover (SFO) takeover has occurred on node {{ $labels.node }}.
              The alert resolves when the event "sfo.giveback.complete" is detected.'
  
    - name: sfo_PartialGiveback_final
      interval: 1m
      rules:
        - record: sfo_PartialGiveback_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="sfo.PartialGiveback"}[2m])
            )
        - record: sfo_giveback_complete_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="sfo.giveback.complete"}[2m])
            )
        - record: sfo_PartialGiveback_persistent
          expr: |
            (
              sfo_PartialGiveback_trigger
              or
              sfo_PartialGiveback_persistent
            )
            unless
            sfo_giveback_complete_trigger
  
    - name: sfo_PartialGiveback_alerts
      rules:
        - alert: SfoPartialGiveback
          expr: sfo_PartialGiveback_persistent == 1
          for: 2m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🟡 Partial giveback occurred on {{ $labels.node }}'
            description: >
              'A partial giveback has occurred on node {{ $labels.node }}. Not all
              resources may have been returned. The alert resolves when the event
              "sfo.giveback.complete" is detected.'
  
    - name: cf_rsrc_takeoverOpFail_final
      interval: 1m
      rules:
        - record: cf_rsrc_takeoverOpFail_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="cf.rsrc.takeoverOpFail"}[2m])
            )
        - record: sfo_giveback_complete_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="sfo.giveback.complete"}[2m])
            )
        - record: cf_rsrc_takeoverOpFail_persistent
          expr: |
            (
              cf_rsrc_takeoverOpFail_trigger
              or
              cf_rsrc_takeoverOpFail_persistent
            )
            unless
            sfo_giveback_complete_trigger
  
    - name: cf_rsrc_takeoverOpFail_alerts
      rules:
        - alert: CfRsrcTakeoverOpFail
          expr: cf_rsrc_takeoverOpFail_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Resource takeover operation failed on {{ $labels.node }}'
            description: >
              'A resource takeover operation has failed on node {{ $labels.node }}.
              The alert resolves when the event "sfo.giveback.complete" is detected.'
  
    - name: ha_giveback_aggrOnlineFailed_final
      interval: 1m
      rules:
        - record: ha_giveback_aggrOnlineFailed_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, name, aggregate) (
              max_over_time(ems_events{message="ha.giveback.aggrOnlineFailed"}[2m])
            )
        - record: raid_vol_state_online_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, name, aggregate) (
              max_over_time(ems_events{message="raid.vol.state.online"}[2m])
            )
        - record: ha_giveback_aggrOnlineFailed_persistent
          expr: |
            (
              ha_giveback_aggrOnlineFailed_trigger
              or
              ha_giveback_aggrOnlineFailed_persistent
            )
            unless
            raid_vol_state_online_trigger
  
    - name: ha_giveback_aggrOnlineFailed_alerts
      rules:
        - alert: HaGivebackAggrOnlineFailed
          expr: ha_giveback_aggrOnlineFailed_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Failed to bring aggregate {{ $labels.aggregate }} online during giveback'
            description: >
              'During a giveback operation on node {{ $labels.node }}, aggregate
              {{ $labels.aggregate }} failed to come online. Manual intervention may
              be required. The alert resolves when the aggregate is back online
              ("raid.vol.state.online").'
  
    - name: cf_fm_notkoverClusterDisable_final
      interval: 1m
      rules:
        - record: cf_fm_notkoverClusterDisable_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="cf.fm.notkoverClusterDisable"}[2m])
            )
        - record: cf_fsm_takeoverOfPartnerEnabled_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid) (
              max_over_time(ems_events{message="cf.fsm.takeoverOfPartnerEnabled"}[2m])
            )
        - record: cf_fm_notkoverClusterDisable_persistent
          expr: |
            (
              cf_fm_notkoverClusterDisable_trigger
              or
              cf_fm_notkoverClusterDisable_persistent
            )
            unless
            cf_fsm_takeoverOfPartnerEnabled_trigger
  
    - name: cf_fm_notkoverClusterDisable_alerts
      rules:
        - alert: CfFmNotkoverClusterDisable
          expr: cf_fm_notkoverClusterDisable_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Cluster Failover disabled on {{ $labels.node }}'
            description: >
              'Cluster failover takeover has been disabled on node {{ $labels.node }}.
              High availability is compromised. The alert resolves when takeover is
              re-enabled ("cf.fsm.takeoverOfPartnerEnabled").'
  
    - name: clam_partner_halting_final
      interval: 1m
      rules:
        - record: clam_partner_halting_trigger
          expr: |
            max by (netapp_cluster, datacenter, cluster_uuid, node) (
              max_over_time(ems_events{message="clam.partner.halting"}[2m])
            )
        - record: cf_fm_takeover_Complete_trigger
          expr: |
            max by (netapp_cluster, datacenter, cluster_uuid, node) (
              max_over_time(ems_events{message="cf.fm.takeoverComplete"}[2m])
            )
        - record: clam_partner_halting_persistent
          expr: |
            (
              clam_partner_halting_trigger
              or
              clam_partner_halting_persistent
            )
            unless
            cf_fm_takeover_Complete_trigger
  
    - name: clam_partner_halting_alerts
      rules:
        - alert: ClamPartnerHalting
          expr: clam_partner_halting_persistent == 1
          for: 2m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_ha
          annotations:
            summary: '🔴 Partner node is halting on {{ $labels.node }}'
            description: >
              'The partner node of {{ $labels.node }} is halting.
              This will likely lead to a takeover. The alert resolves when
              the event "cf.fm.takeoverComplete" is detected.'
