# Source: netapp-monitoring-operations/templates/alerts.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-harvest-poller-alerts
  namespace: monsoon3
  labels:
    prometheus: storage
    helm.sh/chart: netapp-monitoring-operations-1.0.2
    app.kubernetes.io/name: netapp-monitoring-operations
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "1.0.2"
    app.kubernetes.io/managed-by: Helm
  annotations:
    prometheus.io/alert: "true"
spec:
  
  groups:
    - name: harvest-netapp-scrape
      rules:
        - alert: HarvestNotScrapingNetApp
          expr: |
            (
              group by (poller, cluster, addr, Service, datacenter, lob) (poller_status)
              unless on (poller)
              label_replace(count_over_time(node_labels[10m]) > 0, "poller", "$1", "netapp_cluster", "(.*)")
            )
            unless on (poller)
            label_replace(count_over_time(cisco_switch_labels[10m]) > 0, "poller", "$1", "switch", "(.*)")
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: harvest-poller
          annotations:
            summary: "Harvest not scraping Poller {{ $labels.poller }}"
            description: |
              Harvest Poller {{ $labels.poller }} has not scraped this NetApp device since 15 minutes.
  
              **Details:**
              • Service: {{ $labels.Service }}
              • Address: {{ $labels.addr }}
              • Gardener-Cluster: {{ $labels.cluster }}
              • Datacenter: {{ $labels.datacenter }}
              • Lob: {{ $labels.lob }}
              • Poller: {{ $labels.poller }}
