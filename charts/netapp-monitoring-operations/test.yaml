apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-netapp-lun-alerts
  namespace: monsoon3
  labels:
    prometheus: storage
    helm.sh/chart: netapp-monitoring-operations-1.0.2
    app.kubernetes.io/name: netapp-monitoring-operations
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "1.0.2"
    app.kubernetes.io/managed-by: Helm
  annotations:
    prometheus.io/alert: "true"
spec:
  
  groups:
    - name: netapp_lun_recording
      interval: 1m
      rules:
        # lun offline (metric-based, stateful)
        - record: lun_offline_trigger
          expr: |
            max by (netapp_cluster, node, lun) (lun_labels{state!="online"}) == 1
        - record: lun_offline_ok_trigger
          expr: |
            max by (netapp_cluster, node, lun) (lun_labels{state="online"}) == 1
        - record: lun_offline_persistent
          expr: |
            (
              lun_offline_trigger
              or
              lun_offline_persistent
            )
            unless
            lun_offline_ok_trigger
  
    - name: netapp_lun_alerts
      rules:
        - alert: LunOffline
          expr: lun_offline_persistent == 1
          for: 2m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_lun
          annotations:
            summary: '🟡 LUN {{ $labels.lun }} is offline'
            description: >
              'LUN {{ $labels.lun }} on node {{ $labels.node }},
              cluster {{ $labels.netapp_cluster }} is offline.'
  
        - alert: LUNNVfail
          expr: (ems_events{message="LUN.nvfail.vol.proc.complete"})
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_lun
          annotations:
            summary: LUNs brought offline due to nvlog inconsistency (instance {{ $labels.instance }})
            description: |
              LUNs in volume have been brought offline because an inconsistency was detected in the nvlog during boot or takeover
              VALUE = {{ $value }}
              Cluster: {{ $labels.cluster }}, Node: {{ $labels.node }}, Datacenter: {{ $labels.datacenter }}
---
