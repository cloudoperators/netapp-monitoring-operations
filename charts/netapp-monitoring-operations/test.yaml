apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: test-harvest-pod-monitor
  namespace: monsoon3
  labels:
    prometheus: storage
    helm.sh/chart: netapp-monitoring-operations-1.0.2
    app.kubernetes.io/name: netapp-monitoring-operations
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "1.0.2"
    app.kubernetes.io/managed-by: Helm
spec:
  jobLabel: "ccloud/service"
  namespaceSelector:
    matchNames:
      - storage-product
  selector:
    matchLabels:
      ccloud/service: netapp-monitoring
  podMetricsEndpoints:
    - interval: 15s
      path: "/metrics"
      scheme: "http"
      port: "metrics"
      metricRelabelings:
        - sourceLabels: [cluster]
          targetLabel: netapp_cluster
          action: replace
