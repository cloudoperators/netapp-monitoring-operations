apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-netapp-cluster-alerts
  namespace: monsoon3
  labels:
    prometheus: storage
    helm.sh/chart: netapp-monitoring-operations-1.0.2
    app.kubernetes.io/name: netapp-monitoring-operations
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "1.0.2"
    app.kubernetes.io/managed-by: Helm
  annotations:
    prometheus.io/alert: "true"
spec:
  
  groups:
    - name: netapp_cluster_recording
      interval: 1m
      rules:
        - record: upgrademgr_update_pausedErr_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, name) (
              max_over_time(ems_events{message="upgrademgr.update.pausedErr"}[2m])
            )
        - record: upgrademgr_update_resumed_trigger
          expr: |
            max by (netapp_cluster, node, datacenter, cluster_uuid, name) (
              max_over_time(ems_events{message="upgrademgr.update.resumed"}[2m])
            )
        - record: upgrademgr_update_pausedErr_persistent
          expr: |
            (
              upgrademgr_update_pausedErr_trigger
              or
              upgrademgr_update_pausedErr_persistent
            )
            unless
            upgrademgr_update_resumed_trigger
  
    - name: netapp_cluster_alerts
      rules:
        - alert: ClusterSwitchPortCRCerrors
          expr: (ems_events{message="vifmgr.cluscheck.hwerrors"})
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_cluster_switch
          annotations:
            summary: Cluster switch port CRC errors (instance {{ $labels.instance }})
            description: |
              Cluster switch port CRC errors
              VALUE = {{ $value }}
              Cluster: {{ $labels.cluster }}, Node: {{ $labels.node }}, Datacenter: {{ $labels.datacenter }}
  
        - alert: ClusterSwitchReboot
          expr: (ems_events{message="cluster.switch.reboot"})
          for: 5m
          labels:
            severity: critical
            support_group: storage
            team: sci-storage
            component: netapp_cluster_switch
          annotations:
            summary: Cluster switch reboot (instance {{ $labels.instance }})
            description: |
              Cluster switch reboot
              VALUE = {{ $value }}
              Cluster: {{ $labels.cluster }}, Node: {{ $labels.node }}, Datacenter: {{ $labels.datacenter }}
  
        - alert: SecdRpcServerRequestDropped
          expr: (ems_events{message="secd.rpc.server.request.dropped"})
          for: 5m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_cluster_switch
          annotations:
            summary: RPC dropped due to lack of memory (instance {{ $labels.instance }})
            description: |
              This message occurs when an RPC is dropped by SecD due to memory exhaustion.
              VALUE = {{ $value }}
              Cluster: {{ $labels.cluster }}, Node: {{ $labels.node }}, Datacenter: {{ $labels.datacenter }}
  
        - alert: UpgrademgrUpdatePausedErr
          expr: upgrademgr_update_pausedErr_persistent == 1
          for: 2m
          labels:
            severity: warning
            support_group: storage
            team: sci-storage
            component: netapp_cluster_switch
          annotations:
            summary: '🟡 Upgrade paused due to error on {{ $labels.node }}'
            description: >
              'The automated upgrade on node {{ $labels.node }} (Cluster:
              {{ $labels.netapp_cluster }}) has been paused due to an error. The
              alert resolves when the event "upgrademgr.update.resumed" is detected.'
---
